<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Day 1 · Portland → Seattle</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,"Noto Sans KR",sans-serif;background:#F1F5F9;color:#1E293B}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(135deg,#1E3A8A,#2563EB);padding:10px 14px 0}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.hdr-badge{background:rgba(255,255,255,.22);border-radius:7px;padding:3px 10px;font-size:11px;font-weight:800;color:#fff}
.hdr-title{font-size:17px;font-weight:800;color:#fff}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:1px}
.tabs{display:flex;gap:2px}
.tab{flex:1;padding:8px 2px;border:none;background:rgba(255,255,255,.14);color:rgba(255,255,255,.65);font-size:13px;font-weight:700;font-family:inherit;border-radius:7px 7px 0 0;cursor:pointer;transition:.15s;white-space:nowrap}
.tab.on{background:#fff;color:#1E40AF}

/* ── PANELS: visibility switching — layout always alive ── */
.panels{position:fixed;top:88px;left:0;right:0;bottom:0}
.panel{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;visibility:hidden;z-index:0}
.panel.on{visibility:visible;z-index:10}

/* ══════════ TAB 0 — OVERVIEW ══════════ */
.ov-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 32px;background:#F1F5F9}
.ov-banner{background:linear-gradient(120deg,#1E3A8A,#2563EB);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;color:#fff}
.ov-d{font-size:26px;font-weight:900;line-height:1}
.ov-dt{font-size:12px;font-weight:800}
.ov-ds{font-size:10px;opacity:.75;margin-top:2px}
.timebar-wrap{background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:10px}
.timebar-lbl{font-size:9px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.timebar{display:flex;height:18px;border-radius:5px;overflow:hidden;gap:1px}
.timebar-seg{cursor:pointer;transition:opacity .15s;min-width:3px}
.timebar-seg:active{opacity:.7}
.timebar-ends{display:flex;justify-content:space-between;margin-top:3px}
.timebar-end{font-size:8px;color:#94A3B8;font-weight:600}
.tl{position:relative;padding-left:56px;margin-top:4px}
.tl::before{content:"";position:absolute;left:24px;top:8px;bottom:8px;width:2px;background:#E2E8F0;border-radius:1px}
.tl-row{position:relative;margin-bottom:5px}
.tl-axis{position:absolute;left:-56px;width:56px;display:flex;flex-direction:column;align-items:center;padding-top:10px}
.tl-time{font-size:9px;font-weight:700;color:#94A3B8;white-space:nowrap;line-height:1}
.tl-dot{width:11px;height:11px;border-radius:50%;margin-top:4px;border:2px solid #fff;flex-shrink:0}
.tl-block{border-radius:9px;background:#fff;border-left:4px solid;overflow:hidden;cursor:pointer;transition:transform .12s}
.tl-block:active{transform:scale(.98)}
.tl-in{padding:8px 10px}
.tl-head{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.tl-ico{font-size:14px;flex-shrink:0}
.tl-name{font-size:17px;font-weight:800;flex:1;line-height:1.2}
.tl-pills{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:3px}
.tl-pill{font-size:11px;font-weight:700;border-radius:999px;padding:1px 7px;white-space:nowrap}
.tl-best{font-size:15px;color:#475569;line-height:1.4;margin-top:3px}
.tl-hint{font-size:11px;color:#94A3B8;margin-top:3px;font-weight:600}
.dur-bar{height:3px;border-radius:2px;margin-top:5px;opacity:.3}

/* ══════════ TAB 1 — MAP ══════════ */
.deck-wrap{flex-shrink:0;background:#fff;border-bottom:1px solid #E2E8F0;overflow:hidden;touch-action:pan-y}
.deck{display:flex;will-change:transform;transition:transform .34s cubic-bezier(.4,0,.2,1)}
.sc{min-width:100%;padding:10px 14px}
.sc-time{font-size:12px;font-weight:700;color:#94A3B8;margin-bottom:3px}
.sc-head{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.sc-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.sc-name{font-size:17px;font-weight:800;flex:1;line-height:1.2}
.sc-cat{font-size:11px;font-weight:700;border-radius:999px;padding:2px 8px;white-space:nowrap}
.sc-desc{font-size:15px;color:#64748B;line-height:1.5;margin-bottom:7px}
.sc-row{display:flex;align-items:center;gap:5px}
.sc-btns{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.deck-dots{display:flex;justify-content:center;gap:4px;padding:6px 0;background:#fff;border-bottom:1px solid #E2E8F0;flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:#E2E8F0;cursor:pointer;transition:.18s}
.dot.on{background:#2563EB;transform:scale(1.4)}
.mini-wrap{background:#fff;border-bottom:1px solid #E2E8F0;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;padding:7px 10px;flex-shrink:0}
.mini-wrap::-webkit-scrollbar{display:none}
.mini-row{display:flex;align-items:flex-start;width:max-content}
.mini-stop{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:0 3px}
.mini-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;border:2px solid transparent;transition:.18s;flex-shrink:0}
.mini-num.on{border-color:#1E293B;transform:scale(1.15)}
.mini-lbl{font-size:7.5px;color:#94A3B8;text-align:center;width:50px;line-height:1.2;font-weight:600;word-break:keep-all}
.mini-lbl.on{color:#1E293B;font-weight:800}
.mini-arr{font-size:9px;color:#CBD5E1;padding:7px 1px 0;flex-shrink:0}
.map-box{flex:1;position:relative;background:#E8EDF2}
.map-box iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.map-spin{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#94A3B8;font-weight:600;pointer-events:none}
.route-btn{position:absolute;top:12px;right:12px;z-index:25;background:rgba(37,99,235,.92);color:#fff;border:none;border-radius:22px;padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(37,99,235,.4);letter-spacing:.3px}
.route-btn.on{background:#2563EB;color:#fff}

/* ══════════ TAB 2 — SCHEDULE ══════════ */
.sched-row{flex:1;display:flex;overflow:hidden;background:#F1F5F9}
.slider-col{width:68px;flex-shrink:0;background:#fff;border-right:1px solid #E2E8F0;display:flex;flex-direction:column;align-items:center;padding:12px 0;touch-action:none;user-select:none;-webkit-user-select:none}
.sl-lbl{font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px}
.track-area{flex:1;width:100%;position:relative}
.track-bg{position:absolute;left:50%;top:10px;bottom:10px;width:3px;background:#E2E8F0;border-radius:2px;transform:translateX(-50%)}
.track-fill{position:absolute;left:50%;top:10px;width:3px;background:#2563EB;border-radius:2px;transform:translateX(-50%);height:0;will-change:height}
.stk{position:absolute;left:0;right:0;display:flex;flex-direction:column;align-items:center;transform:translateY(-50%);cursor:pointer;z-index:3}
.stk-dot{border-radius:50%;background:#CBD5E1;border:2px solid #fff;transition:background .15s,transform .15s;flex-shrink:0}
.stk-dot.on{background:#2563EB;box-shadow:0 0 0 3px #BFDBFE;transform:scale(1.35)}
.stk-lbl{font-size:9px;font-weight:700;color:#94A3B8;margin-top:2px;white-space:nowrap;transition:color .15s;text-align:center;line-height:1.1}
.stk-lbl.on{color:#1D4ED8}
.thumb{position:absolute;left:50%;width:42px;height:42px;border-radius:50%;background:#1D4ED8;border:3px solid #fff;box-shadow:0 3px 14px rgba(29,78,216,.4);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;line-height:1.25;text-align:center;z-index:20;touch-action:none;cursor:grab;will-change:transform}
.thumb.drag{cursor:grabbing;box-shadow:0 6px 20px rgba(29,78,216,.55)}
.cards-col{flex:1;overflow:hidden;position:relative}
.cards-inner{background:#F1F5F9;position:absolute;inset:0;will-change:transform}
.cards-inner.anim{transition:transform .32s cubic-bezier(.4,0,.2,1)}
.ev-card{position:absolute;left:10px;right:10px;top:0;border-radius:14px;background:#fff;border:2px solid #E2E8F0;display:flex;flex-direction:column;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.ev-card.on{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.card-hd{padding:12px 14px 10px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid #F1F5F9;flex-shrink:0;cursor:pointer}
.card-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.card-meta{flex:1;min-width:0}
.card-name{font-size:18px;font-weight:800;line-height:1.25;margin-bottom:3px}
.card-tr{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.card-time{font-size:13px;color:#64748B;font-weight:700}
.card-dur{font-size:11px;font-weight:700;border-radius:999px;padding:1px 7px}
.card-cat{font-size:11px;font-weight:700;border-radius:999px;padding:2px 8px}
.card-nav{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;align-self:center}
.nav-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid #E2E8F0;background:#F8FAFC;display:flex;align-items:center;justify-content:center;font-size:13px;color:#64748B;cursor:pointer;transition:background .15s,transform .1s;touch-action:manipulation}
.nav-btn:active{background:#E2E8F0;transform:scale(.9)}
.nav-btn.dim{opacity:.2;pointer-events:none}
.card-body{padding:11px 14px 28px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;overscroll-behavior:contain}
.card-desc{font-size:14px;color:#475569;line-height:1.65;margin-bottom:10px}
.hl-block{background:#F8FAFC;border-radius:9px;padding:9px 12px;margin-bottom:10px}
.hl-ttl{font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.hl-row{display:flex;gap:6px;font-size:15px;line-height:1.5;margin-bottom:4px;color:#334155}
.hl-row:last-child{margin-bottom:0}
.hl-i{flex-shrink:0;font-size:12px}
.chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px}
.chip{font-size:14px;font-weight:600;border-radius:999px;padding:3px 10px;background:#F1F5F9;color:#475569}
.chip.cost{background:#ECFDF5;color:#065F46}
.chip.warn{background:#FEF2F2;color:#991B1B;font-weight:700}
.card-btns{display:flex;gap:5px;flex-wrap:wrap}
.card-foot{padding:6px 14px 10px;flex-shrink:0;border-top:1px solid #F1F5F9;background:#fff;border-radius:0 0 14px 14px;display:flex;flex-direction:column;gap:6px}
.card-btns-row{display:flex;gap:5px;flex-wrap:wrap}
.card-nav-row{display:flex;align-items:center;justify-content:space-between;padding-top:4px;border-top:1px solid #F1F5F9}
.card-nav-btn{background:none;border:none;color:#2563EB;font-size:13px;font-weight:600;padding:4px 8px;cursor:pointer;border-radius:6px}
.card-nav-btn:active{background:#EFF6FF}
.card-nav-btn.dim{color:#CBD5E1;pointer-events:none}
.card-nav-idx{font-size:12px;color:#94A3B8;font-weight:500}
.btn{display:inline-flex;align-items:center;gap:3px;border:none;border-radius:7px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-blue{background:#2563EB;color:#fff}
.btn-green{background:#16A34A;color:#fff}
.btn-purple{background:#7C3AED;color:#fff}
.btn-amber{background:#D97706;color:#fff}
.btn-gray{background:#F1F5F9;color:#475569;border:1.5px solid #E2E8F0}

/* ══════════ PHOTO POPUP ══════════ */
.overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.82);align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.popup{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;height:88vh;display:flex;flex-direction:column;overflow:hidden;animation:popUp .26s ease}
@keyframes popUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* drag-to-close header */
.pop-hd{flex-shrink:0;background:#fff;padding:8px 14px 10px;border-bottom:1px solid #F1F5F9;touch-action:none;user-select:none;cursor:grab}
.pop-drag-bar{width:36px;height:4px;border-radius:2px;background:#E2E8F0;margin:0 auto 8px}
.pop-hd-row{display:flex;align-items:center;justify-content:space-between}
.pop-ttl{font-size:14px;font-weight:800}
.pop-x{width:28px;height:28px;border-radius:50%;background:#F1F5F9;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#64748B}

/* photo section — resizable */
.photo-section{display:none}



.photo-slide img{width:100%;object-fit:cover;display:block;background:#E2E8F0}







.pdot.on{background:#2563EB;transform:scale(1.3)}

/* drag handle between photo and info */



/* info area */
.info-area{flex:1;display:flex;overflow:hidden;min-height:0}

/* left: poi list — text only, no emoji */
.pop-left{
  width:80px;flex-shrink:0;
  background:#F8FAFC;border-right:1px solid #F1F5F9;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:4px 0;
}
.poi-item{
  padding:9px 8px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s,border-color .15s;
}
.poi-item.on{background:#EFF6FF;border-left-color:#2563EB}
.poi-item-name{font-size:12px;font-weight:600;font-size:9px;font-weight:700;color:#64748B;line-height:1.35;word-break:keep-all}
.poi-item.on .poi-item-name{font-size:12px;font-weight:600;color:#1E40AF;font-weight:800}
.poi-item-num{font-size:8px;color:#94A3B8;margin-top:3px}
.poi-item.on .poi-item-num{color:#2563EB}
.poi-sep{height:1px;background:#F1F5F9}

/* right: detail slides */
.poi-num{font-size:12px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.poi-name{font-size:17px;font-weight:800;color:#1E293B;margin-bottom:8px;line-height:1.3}
.poi-desc{font-size:16px;color:#475569;line-height:1.7;margin-bottom:12px}
.poi-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#2563EB;text-decoration:none;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:7px;padding:6px 12px}
.poi-link:active{background:#DBEAFE}

/* RIGHT PANEL: absolute overlay slides */
.pop-right{flex:1;position:relative;overflow:hidden}
.poi-slide{
  position:absolute;inset:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px 14px 20px;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.poi-slide.active{opacity:1;pointer-events:auto}

.google-search-btn{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:10px;padding:8px 13px;
  background:#4285F4;color:#fff;border-radius:20px;
  font-size:13px;font-weight:600;text-decoration:none;
  box-shadow:0 2px 6px rgba(66,133,244,.35);
}
.google-search-btn:active{opacity:.8}

/* ── INLINE PHOTO STRIP ── */
.ph-strip{display:flex;gap:6px;margin:10px 0 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.ph-strip::-webkit-scrollbar{display:none}
.ph-thumb{flex-shrink:0;width:90px;height:68px;border-radius:8px;object-fit:cover;background:#E2E8F0;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.ph-thumb:active{border-color:#2563EB;opacity:.85}
.ph-thumb.loading{background:linear-gradient(90deg,#E2E8F0 25%,#F1F5F9 50%,#E2E8F0 75%);background-size:200% 100%;animation:shimmer 1.2s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.ph-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.ph-lightbox img{max-width:100%;max-height:90vh;border-radius:10px;object-fit:contain}
.ph-lightbox-close{position:absolute;top:16px;right:18px;color:#fff;font-size:26px;cursor:pointer;z-index:10000}

/* ── CARD SCROLL FADE HINT ── */
.card-body-wrap{position:relative;flex:1;min-height:0;display:flex;flex-direction:column}
.card-body-wrap::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:32px;
  background:linear-gradient(transparent,rgba(255,255,255,.95));
  pointer-events:none;border-radius:0 0 4px 4px;
  transition:opacity .2s;
}
.card-body-wrap.scrolled-end::after{opacity:0}
.card-body{padding:11px 14px 28px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;overscroll-behavior:contain}

/* ── CARD EXPAND VIEW ── */
.ce-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(15,23,42,.7);animation:ceFadeIn .18s ease}
.ce-overlay.on{display:flex;align-items:flex-end;justify-content:center}
@keyframes ceFadeIn{from{opacity:0}to{opacity:1}}
.ce-box{width:100%;max-width:520px;height:92vh;background:#fff;border-radius:20px 20px 0 0;display:flex;flex-direction:column;overflow:hidden;animation:ceSlideUp .22s cubic-bezier(.4,0,.2,1)}
@keyframes ceSlideUp{from{transform:translateY(60px);opacity:.6}to{transform:translateY(0);opacity:1}}
.ce-hd{padding:14px 16px 12px;display:flex;align-items:center;gap:11px;border-bottom:1px solid #F1F5F9;flex-shrink:0}
.ce-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ce-meta{flex:1;min-width:0}
.ce-name{font-size:17px;font-weight:800;color:#1E293B;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ce-time{font-size:13px;color:#64748B;margin-top:2px}
.ce-close{background:none;border:none;font-size:20px;color:#94A3B8;padding:4px 8px;cursor:pointer}
.ce-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;overscroll-behavior:contain}
.ce-body .card-desc{font-size:15px;color:#334155;line-height:1.6;margin-bottom:14px}
.ce-body .hl-block{margin-bottom:14px}
.ce-body .hl-ttl{font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.ce-body .hl-row{display:flex;gap:8px;font-size:14px;line-height:1.55;margin-bottom:5px;color:#334155}
.ce-body .hl-i{flex-shrink:0;width:18px;color:#F59E0B}
.ce-body .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.ce-body .chip{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:20px;padding:4px 10px;font-size:12px;color:#475569}
.ce-body .chip.cost{background:#FFF7ED;border-color:#FED7AA;color:#9A3412}
.ce-foot{padding:10px 16px 20px;flex-shrink:0;border-top:1px solid #F1F5F9;display:flex;gap:8px;flex-wrap:wrap;background:#fff}
.ce-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 4px;flex-shrink:0;border-bottom:1px solid #F1F5F9}
.ce-nav-btn{background:none;border:none;color:#2563EB;font-size:14px;font-weight:700;padding:6px 10px;cursor:pointer;border-radius:8px}
.ce-nav-btn:active{background:#EFF6FF}
.ce-nav-btn.dim{color:#CBD5E1;pointer-events:none}
.ce-nav-idx{font-size:13px;color:#94A3B8;font-weight:500}




/* ── CARD HEADER UPDATES ── */
.card-hd-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:3px}
.card-expand-mini{background:none;border:none;color:#2563EB;font-size:12px;font-weight:600;
  padding:2px 6px;cursor:pointer;white-space:nowrap;flex-shrink:0;opacity:.8}
.card-expand-mini:active{opacity:1}
.card-cat-inline{font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;flex-shrink:0}
.card-chips-inline{display:flex;gap:4px;flex-wrap:wrap;padding:4px 14px 6px;flex-shrink:0}
.card-chips-inline .chip{font-size:12px;padding:3px 8px}

/* ── HIGHLIGHT ACCORDION ── */

/* ══ CONSTANTS ══ */
const N=EVS.length, T_START=9*60, T_END=20.5*60, T_SPAN=T_END-T_START;
function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function durLabel(m){return m<60?`${m}분`:m%60===0?`${m/60}시간`:`${Math.floor(m/60)}시간 ${m%60}분`;}
function eRatio(ev){return(toMin(ev.start)-T_START)/T_SPAN;}

/* ══ SHARED STATE ══ */
let activeIdx=0;   // current event index (shared between all tabs)
let curTab=0;

/* ══════════════════════════════════
   TAB SWITCHING — syncs event index
══════════════════════════════════ */
function showTab(n){
  curTab=n;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===n));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('on',i===n));
  if(n===1){
    if(!mapBuilt){buildMap();mapBuilt=true;}
    else mapGoTo(activeIdx);  // sync map to current event
  }
  if(n===2) requestAnimationFrame(()=>requestAnimationFrame(()=>{positionTicks();layoutCards();snapTo(activeIdx,false);initCardScrollHints();}));  // sync schedule
}

/* ══════════════════════════════════
   MAP / NAV LINKS
   — Google Maps web URL, same tab on mobile
══════════════════════════════════ */
function gmUrl(ev, mode){
  const name=encodeURIComponent(ev.name);
  if(mode==='nav')
    return `https://www.google.com/maps/dir/?api=1&destination=${name}&destination_place_id=${ev.pid}&travelmode=driving`;
  return `https://www.google.com/maps/search/?api=1&query=${name}&query_place_id=${ev.pid}`;
}
function openGM(evIdx, mode){
  const ev=EVS[evIdx]; if(!ev||!ev.pid) return;
  window.location.href=gmUrl(ev,mode);
}
// Legacy wrappers (called from inline onclick with pid)
function openMap(pid){const i=EVS.findIndex(e=>e.pid===pid);if(i>=0)openGM(i,'map');}
function openNav(pid){const i=EVS.findIndex(e=>e.pid===pid);if(i>=0)openGM(i,'nav');}

/* ══════════════════════════════════
   TAB 0 — OVERVIEW
══════════════════════════════════ */
function scrollToOvEvent(i){
  const el=document.getElementById(`ov-ev-${i}`);
  const sc=document.getElementById('ovScroll');
  if(!el||!sc) return;
  showTab(0);
  setTimeout(()=>{
    sc.scrollTo({top:el.getBoundingClientRect().top+sc.scrollTop-20,behavior:'smooth'});
    el.style.outline='3px solid #2563EB';
    setTimeout(()=>el.style.outline='',800);
  },80);
}

function buildOverview(){
  const wrap=document.getElementById('ovScroll');

  // banner
  const b=document.createElement('div');b.className='ov-banner';
  b.innerHTML=`<div class="ov-d">D1</div><div><div class="ov-dt">4월 15일 (화) · Portland → Seattle</div><div class="ov-ds">렌터카 → Hertz 4pm 반납 → 우버/도보 · 09:00–21:30</div></div>`;
  wrap.appendChild(b);

  // timebar — click scrolls to that event in overview
  const tb=document.createElement('div');tb.className='timebar-wrap';
  let bh=`<div class="timebar-lbl">타임바 — 탭하면 해당 일정으로 이동</div><div class="timebar">`;
  EVS.forEach((ev,i)=>{
    const flex=(ev.dur/T_SPAN*100).toFixed(2);
    bh+=`<div class="timebar-seg" title="${ev.start} ${ev.name}" style="flex:${flex};background:${ev.color}" onclick="scrollToOvEvent(${i})"></div>`;
  });
  bh+=`</div><div class="timebar-ends"><span class="timebar-end">09:00</span><span class="timebar-end">21:30</span></div>`;
  tb.innerHTML=bh; wrap.appendChild(tb);

  // timeline rows
  const tl=document.createElement('div');tl.className='tl';
  EVS.forEach((ev,i)=>{
    const sm=ev.dur<=30;
    const bh2=Math.max(sm?48:82,ev.dur*(sm?1.1:1.5));
    const hp=ev.photos.length>0;
    const best=ev.hl.length?ev.hl[0].t:'';
    const row=document.createElement('div');row.className='tl-row';
    row.innerHTML=`
      <div class="tl-axis"><div class="tl-time">${ev.start}</div><div class="tl-dot" style="background:${ev.color}"></div></div>
      <div class="tl-block" id="ov-ev-${i}" style="border-left-color:${ev.color};min-height:${bh2}px"
           onclick="activeIdx=${i};showTab(2);setTimeout(()=>snapTo(${i},true),60)">
        <div class="tl-in">
          <div class="tl-head"><span class="tl-ico">${ev.icon}</span><span class="tl-name">${ev.name}</span></div>
          <div class="tl-pills">
            <span class="tl-pill" style="background:${ev.catBg};color:${ev.catClr}">${ev.cat}</span>
            <span class="tl-pill" style="background:${ev.color}18;color:${ev.color}">⏱ ${durLabel(ev.dur)}</span>
            ${ev.cost!=='-'?`<span class="tl-pill" style="background:#ECFDF5;color:#065F46">💰 ${ev.cost}</span>`:''}
            ${ev.note.includes('⚠')?`<span class="tl-pill" style="background:#FEF2F2;color:#991B1B">${ev.note}</span>`:''}
            ${hp?`<span class="tl-pill" style="background:#F5F3FF;color:#6D28D9;cursor:pointer" onclick="event.stopPropagation();openPopup(${i})">${ev.cat==='식사'?'🍴 사진':'📸 사진'}</span>`:''}
          </div>
          ${!sm&&best?`<div class="tl-best">⭐ ${best}</div>`:''}
          ${!sm?`<div class="tl-hint">탭 → 시간표 상세</div>`:''}
          <div class="dur-bar" style="background:${ev.color}"></div>
        </div>
      </div>`;
    tl.appendChild(row);
  });
  const er=document.createElement('div');er.className='tl-row';
  er.innerHTML=`<div class="tl-axis"><div class="tl-time">21:30</div><div class="tl-dot" style="background:#94A3B8"></div></div><div style="padding:8px 10px;font-size:11px;color:#94A3B8;font-weight:600">✅ Day 1 완료</div>`;
  tl.appendChild(er);
  wrap.appendChild(tl);
}

/* ══════════════════════════════════
   TAB 1 — MAP
══════════════════════════════════ */
let mapBuilt=false, showingRoute=false;

function buildMap(){
  const deck=document.getElementById('deck'),dots=document.getElementById('dots'),mini=document.getElementById('mini');
  EVS.forEach((ev,i)=>{
    // card
    const c=document.createElement('div');c.className='sc';
    c.innerHTML=`
      <div class="sc-time">${ev.start} · ${i+1}/${N}</div>
      <div class="sc-head">
        <div class="sc-num" style="background:${ev.color}">${i+1}</div>
        <div class="sc-name">${ev.name}</div>
        <span class="sc-cat" style="background:${ev.catBg};color:${ev.catClr}">${ev.cat}</span>
      </div>
      <div class="sc-desc">${ev.desc}</div>
      <div class="sc-row">
        <div class="sc-btns">
          ${ev.pid?`<button class="btn btn-blue" onclick="openGM(${i},'map')">📍 지도</button><button class="btn btn-green" onclick="openGM(${i},'nav')">🧭 길찾기</button>`:''}
          ${ev.hl.length?`<button class="btn ${ev.cat==='식사'?'btn-amber':'btn-purple'}" onclick="openPopup(${i})">${ev.cat==='식사'?'🍴 메뉴':'📍 하이라이트'}</button>`:''}
        </div>
        <button class="btn btn-gray" style="margin-left:auto;flex-shrink:0" onclick="activeIdx=${i};showTab(2)">상세 ›</button>
      </div>`;
    deck.appendChild(c);
    // dot
    const d=document.createElement('div');d.className='dot';d.onclick=()=>mapGoTo(i);dots.appendChild(d);
    // mini
    if(i>0){const a=document.createElement('span');a.className='mini-arr';a.textContent='›';mini.appendChild(a);}
    const ms=document.createElement('div');ms.className='mini-stop';
    ms.innerHTML=`<div class="mini-num" id="mn-${i}" style="background:${ev.color}">${i+1}</div><div class="mini-lbl" id="ml-${i}">${ev.name}</div>`;
    ms.onclick=()=>mapGoTo(i);mini.appendChild(ms);
  });

  // deck swipe
  let tx=0,sw=false;
  const dw=document.getElementById('deckWrap');
  dw.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;sw=false;},{passive:true});
  dw.addEventListener('touchmove',e=>{const dx=Math.abs(e.touches[0].clientX-tx);if(!sw&&dx>8)sw=true;if(sw)e.preventDefault();},{passive:false});
  dw.addEventListener('touchend',e=>{
    if(!sw)return;
    const dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)>40){
      const next=dx<0?Math.min(N-1,activeIdx+1):Math.max(0,activeIdx-1);
      mapGoTo(next);
    }
    sw=false;
  });

  mapGoTo(activeIdx);
}

function mapGoTo(idx){
  // Hide leaflet when going to individual stop
  const ld=document.getElementById('leafletMap');if(ld){ld.style.display='none';document.getElementById('mapIframe').style.display='block';}
  activeIdx=idx;
  showingRoute=false;
  const btn=document.getElementById('routeBtn');
  btn.textContent='🗺 전체 동선'; btn.classList.remove('on');

  document.getElementById('deck').style.transform=`translateX(${-idx*100}%)`;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===idx));
  document.querySelectorAll('.mini-num').forEach((d,i)=>d.classList.toggle('on',i===idx));
  document.querySelectorAll('.mini-lbl').forEach((d,i)=>d.classList.toggle('on',i===idx));
  document.getElementById('mini').querySelectorAll('.mini-stop')[idx]?.scrollIntoView({inline:'center',behavior:'smooth'});

  const ev=EVS[idx];
  const src=ev.lat&&ev.lng
    ? `https://maps.google.com/maps?q=${ev.lat},${ev.lng}&output=embed&z=15`
    : `https://maps.google.com/maps?q=${ev.mapQ}&output=embed&z=15`;
  loadMapIframe(src);
}

function toggleRoute(){
  if(showingRoute){ mapGoTo(activeIdx); return; }
  showingRoute=true;
  const btn=document.getElementById('routeBtn');
  btn.textContent='✕ 닫기'; btn.classList.add('on');

  // Replace iframe with a Leaflet map showing all stops
  const box=document.getElementById('mapBox');
  const spin=document.getElementById('mapSpin');
  spin.style.display='none';

  // Hide iframe, show leaflet div
  const iframe=document.getElementById('mapIframe');
  iframe.style.display='none';

  // Create or reuse leaflet container
  let ldiv=document.getElementById('leafletMap');
  if(!ldiv){
    ldiv=document.createElement('div');
    ldiv.id='leafletMap';
    ldiv.style.cssText='position:absolute;inset:0;z-index:5';
    box.appendChild(ldiv);
  }
  ldiv.style.display='block';

  // Load Leaflet if not loaded
  function initLeaflet(){
    const stops=EVS.filter(e=>e.lat&&e.lng);
    if(stops.length===0) return;

    // Init map
    if(window._leafletMap){
      window._leafletMap.remove();
      window._leafletMap=null;
    }
    const map=L.map('leafletMap');
    window._leafletMap=map;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OpenStreetMap contributors',
      maxZoom:18
    }).addTo(map);

    const bounds=[];
    stops.forEach((ev,i)=>{
      const ll=[ev.lat,ev.lng];
      bounds.push(ll);

      // Numbered circle marker
      const icon=L.divIcon({
        className:'',
        html:`<div style="
          width:28px;height:28px;border-radius:50%;
          background:${ev.color};color:#fff;
          font-size:11px;font-weight:700;
          display:flex;align-items:center;justify-content:center;
          border:2px solid #fff;
          box-shadow:0 2px 6px rgba(0,0,0,.3);
        ">${i+1}</div>`,
        iconSize:[28,28],iconAnchor:[14,14]
      });

      L.marker(ll,{icon})
        .addTo(map)
        .bindPopup(`<b>${ev.start}</b><br>${ev.name}`,{maxWidth:180});
    });

    // Draw route line
    L.polyline(bounds,{color:'#2563EB',weight:3,opacity:.7,dashArray:'6,4'}).addTo(map);

    // Fit to all markers
    map.fitBounds(bounds,{padding:[30,30]});
  }

  if(window.L){
    initLeaflet();
  } else {
    // Load Leaflet CSS + JS
    const css=document.createElement('link');
    css.rel='stylesheet';

    document.head.appendChild(css);

    const js=document.createElement('script');
    js.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';

    document.head.appendChild(js);
  }
}

// Card body scroll fade — hide gradient when scrolled to bottom
function initCardScrollHints(){
  EVS.forEach((_,i)=>{
    const cb=document.getElementById('cb-'+i);
    const wrap=document.getElementById('cbw-'+i);
    if(!cb||!wrap) return;
    function check(){
      const atEnd=cb.scrollHeight-cb.scrollTop<=cb.clientHeight+4;
      wrap.classList.toggle('scrolled-end',atEnd);
    }
    cb.addEventListener('scroll',check,{passive:true});
    // Initial check after layout
    requestAnimationFrame(check);
  });
}

function buildTicks(){
  const ta=document.getElementById('trackArea');
  EVS.forEach((ev,i)=>{
    const sz=ev.dur<=20?7:ev.dur<=45?9:ev.dur<=75?11:14;
    const t=document.createElement('div');t.className='stk';t.id=`stk-${i}`;
    t.innerHTML=`<div class="stk-dot${i===0?' on':''}" id="sd-${i}" style="width:${sz}px;height:${sz}px;background:${ev.color}"></div><div class="stk-lbl${i===0?' on':''}" id="sl-${i}">${ev.start}</div>`;
    t.addEventListener('pointerdown',e=>{e.stopPropagation();snapTo(i,true);});
    ta.appendChild(t);
  });
}

function trackH(){return document.getElementById('trackArea').getBoundingClientRect().height;}
function colH()  {return document.getElementById('cardsCol').getBoundingClientRect().height;}
function idxToPx(i){return 10+eRatio(EVS[i])*(trackH()-20);}
function pxToIdx(px){
  const u=trackH()-20; let b=0,bd=Infinity;
  EVS.forEach((ev,i)=>{const d=Math.abs(px-(10+eRatio(ev)*u));if(d<bd){bd=d;b=i;}});
  return b;
}
function positionTicks(){
  const h=trackH(); if(h<=0)return;
  EVS.forEach((ev,i)=>{
    const px=10+eRatio(ev)*(h-20);
    document.getElementById(`stk-${i}`).style.top=px+'px';
  });
}
function layoutCards(){
  const h=colH(); if(h<=0)return;
  document.getElementById('cardsInner').style.height=(N*h)+'px';
  EVS.forEach((_,i)=>{
    const el=document.getElementById(`ec-${i}`);
    el.style.top=(i*h+10)+'px';
    el.style.height=(h-20)+'px';
  });
}
function renderThumb(px){
  const h=trackH();
  const el=document.getElementById('thumb');
  el.style.top=(px-21)+'px';
  el.style.transform='translateX(-50%)';
  document.getElementById('fill').style.height=(h>0?Math.max(0,(px-10))+'px':'0');
}
function renderTicks(idx){
  const ev=EVS[idx];
  EVS.forEach((_,i)=>{
    document.getElementById(`sd-${i}`).classList.toggle('on',i===idx);
    document.getElementById(`sl-${i}`).classList.toggle('on',i===idx);
    const u=document.getElementById(`nu-${i}`),d=document.getElementById(`nd-${i}`);
    if(u)u.classList.toggle('dim',i===0); if(d)d.classList.toggle('dim',i===N-1);
  });
  document.getElementById('thumb').style.background=ev.color;
  document.getElementById('thumb').textContent=ev.start;
}
function slideCards(idx,anim){
  const h=colH(),ci=document.getElementById('cardsInner');
  if(anim){ci.classList.add('anim');ci.addEventListener('transitionend',()=>ci.classList.remove('anim'),{once:true});}
  else ci.classList.remove('anim');
  ci.style.transform=`translateY(${-idx*h}px)`;
  document.querySelectorAll('.ev-card').forEach((c,i)=>c.classList.toggle('on',i===idx));
}
function snapTo(idx,anim=true){
  activeIdx=idx;
  renderThumb(idxToPx(idx)); renderTicks(idx); slideCards(idx,anim);
}
function navCard(from,dir){const n=from+dir;if(n<0||n>=N)return;snapTo(n,true);}

// Slider drag
let isDrag=false,ancY=0,ancPx=0,rafId=null,pendY=null;
function dragFrame(){
  if(!isDrag)return;
  if(pendY!==null){
    const raw=Math.max(10,Math.min(trackH()-10,ancPx+(pendY-ancY)));
    const idx=pxToIdx(raw);
    renderThumb(raw);
    document.getElementById('fill').style.height=Math.max(0,(raw-10))+'px';
    if(idx!==activeIdx){activeIdx=idx;renderTicks(idx);slideCards(idx,false);}
    pendY=null;
  }
  rafId=requestAnimationFrame(dragFrame);
}
const thumb=document.getElementById('thumb');
thumb.addEventListener('pointerdown',e=>{
  e.preventDefault();thumb.setPointerCapture(e.pointerId);
  isDrag=true;ancY=e.clientY;ancPx=idxToPx(activeIdx);
  thumb.classList.add('drag');pendY=null;rafId=requestAnimationFrame(dragFrame);
});
thumb.addEventListener('pointermove',e=>{if(!isDrag)return;e.preventDefault();pendY=e.clientY;});
thumb.addEventListener('pointerup',e=>{
  if(!isDrag)return;isDrag=false;thumb.classList.remove('drag');cancelAnimationFrame(rafId);
  snapTo(pxToIdx(Math.max(10,Math.min(trackH()-10,ancPx+(e.clientY-ancY)))),true);
});
thumb.addEventListener('pointercancel',()=>{
  if(!isDrag)return;isDrag=false;thumb.classList.remove('drag');cancelAnimationFrame(rafId);snapTo(activeIdx,true);
});
document.getElementById('trackArea').addEventListener('pointerdown',e=>{
  if(e.target===thumb||thumb.contains(e.target))return;
  snapTo(pxToIdx(e.clientY-document.getElementById('trackArea').getBoundingClientRect().top),true);
});

// Card swipe up/down — whole card area, direction-locked
(()=>{
  const col = document.getElementById('cardsCol');
  let sx=0, sy=0, locked=null;

  col.addEventListener('touchstart', e=>{
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    locked = null;
  }, {passive:true});

  col.addEventListener('touchmove', e=>{
    const dx = Math.abs(e.touches[0].clientX - sx);
    const dy = Math.abs(e.touches[0].clientY - sy);
    if(!locked){
      if(dy > 12 && dy > dx*1.5) locked='v';
      else if(dx > 12) locked='h';
    }
    // Only intercept vertical swipes — block default to prevent page scroll
    if(locked==='v') e.preventDefault();
  }, {passive:false});

  col.addEventListener('touchend', e=>{
    if(locked !== 'v') return;
    const dy = e.changedTouches[0].clientY - sy;
    if(Math.abs(dy) > 50) navCard(activeIdx, dy < 0 ? 1 : -1);
    locked = null;
  }, {passive:true});
})();

let popIdx=0;



/* ── UNSPLASH PHOTO FETCH (no API key needed, client-side) ── */
const photoCache={};
async function fetchPhotos(query, containerId){
  const el=document.getElementById(containerId);
  if(!el) return;

  // Check cache
  if(photoCache[query]){
    renderPhotoStrip(el, photoCache[query], query);
    return;
  }

  // Use Unsplash source URL pattern — returns redirect to actual photo
  // We'll use the search API without key via picsum as fallback
  // Actually use: https://source.unsplash.com/featured/?QUERY (deprecated but works)
  // Better: fetch Unsplash search page and parse? No — CORS blocked.
  //
  // BEST approach: use multiple curated Unsplash source URLs per query
  // source.unsplash.com/featured/?{query}&sig={i} gives deterministic photos
  const urls=[];
  for(let i=0;i<4;i++){
    urls.push(`https://source.unsplash.com/180x135/?${encodeURIComponent(query)}&sig=${i*37+7}`);
  }
  photoCache[query]=urls;
  renderPhotoStrip(el, urls, query);
}

function renderPhotoStrip(container, urls, query){
  const strip=document.createElement('div');
  strip.className='ph-strip';
  urls.forEach(src=>{
    const img=document.createElement('img');
    img.className='ph-thumb loading';
    img.onload=()=>img.classList.remove('loading');
    img.onerror=()=>img.parentNode&&img.parentNode.removeChild(img);
    img.src=src;
    img.onclick=()=>openLightbox(src);
    strip.appendChild(img);
  });
  container.appendChild(strip);
}

function openLightbox(src){
  let lb=document.getElementById('phLightbox');
  if(!lb){
    lb=document.createElement('div');
    lb.className='ph-lightbox'; lb.id='phLightbox';
    lb.innerHTML=`<span class="ph-lightbox-close" onclick="document.getElementById('phLightbox').style.display='none'">✕</span><img id="phLbImg">`;
    lb.onclick=e=>{if(e.target===lb)lb.style.display='none';};
    document.body.appendChild(lb);
  }
  document.getElementById('phLbImg').src=src;
  lb.style.display='flex';
}

function openPopup(evIdx){
  const ev=EVS[evIdx];
  document.getElementById('popTtl').textContent=ev.cat==='식사'?`🍴 ${ev.name}`:`📍 ${ev.name}`;

  // Left panel — short name only
  const left=document.getElementById('popLeft'); left.innerHTML='';
  let visIdx=0;
  ev.hl.forEach((h,j)=>{
    if(!h.q) return;
    if(visIdx>0){const sep=document.createElement('div');sep.className='poi-sep';left.appendChild(sep);}
    const shortName=h.t.includes(' — ')?h.t.split(' — ')[0]:h.t;
    const item=document.createElement('div');
    item.className='poi-item'+(visIdx===0?' on':'');
    item.id=`poi-${visIdx}`;
    item.innerHTML=`<div class="poi-item-name">${shortName}</div>`;
    item.onclick=(idx=>()=>selectHl(idx))(visIdx);
    left.appendChild(item);
    visIdx++;
  });

  // Right panel — detail + photo strip + google link
  const right=document.getElementById('popRight'); right.innerHTML='';
  const isFood=ev.cat==='식사';
  let slideIdx=0;
  ev.hl.forEach((h,j)=>{
    if(!h.q) return;
    const slide=document.createElement('div');
    slide.className='poi-slide'+(slideIdx===0?' active':'');
    slide.id='poi-slide-'+slideIdx;
    const shortName=h.t.includes(' — ')?h.t.split(' — ')[0]:h.t;
    const detail=h.t.includes(' — ')?h.t.split(' — ')[1]:'';
    const gUrl='https://www.google.com/search?q='+encodeURIComponent(h.q)+'&tbm=isch';
    slide.innerHTML=
      '<div class="poi-name">'+shortName+'</div>'+
      (detail?'<div class="poi-desc">'+detail+'</div>':'')+
      (h.d?'<div class="poi-desc" style="margin-top:6px">'+h.d+'</div>':'')+
      '<a href="'+gUrl+'" target="_blank" class="google-search-btn">🔍 Google 이미지 검색</a>';
    right.appendChild(slide);
    slideIdx++;
  });

  popIdx=0;
  document.getElementById('overlay').classList.add('on');
}

function selectHl(j){
  popIdx=j;
  document.querySelectorAll('.poi-item').forEach((el,k)=>el.classList.toggle('on',k===j));
  document.querySelectorAll('.poi-slide').forEach((s,k)=>{
    s.classList.toggle('active',k===j);
    if(k===j) s.scrollTop=0;
  });
  const left=document.getElementById('popLeft');
  const act=document.getElementById(`poi-${j}`);
  if(act&&left) left.scrollTo({top:act.offsetTop-4,behavior:'smooth'});


}

function closePopup(){
  const box=document.getElementById('popupBox');
  box.style.transition='transform .26s ease';
  box.style.transform='translateY(100%)';
  setTimeout(()=>{
    document.getElementById('overlay').classList.remove('on');
    box.style.transition=''; box.style.transform='';
  },270);
}

// photo swipe removed (no photo section)

// Right panel: horizontal swipe → next/prev slide
(function(){
  var pr=document.getElementById('popRight');
  var x0=0,y0=0,locked=null;
  pr.addEventListener('touchstart',function(e){x0=e.touches[0].clientX;y0=e.touches[0].clientY;locked=null;},{passive:true});
  pr.addEventListener('touchmove',function(e){
    if(locked==='v')return;
    var dx=Math.abs(e.touches[0].clientX-x0),dy=Math.abs(e.touches[0].clientY-y0);
    if(!locked){if(dx>8&&dx>dy)locked='h';else if(dy>8)locked='v';}
    if(locked==='h')e.preventDefault();
  },{passive:false});
  pr.addEventListener('touchend',function(e){
    if(locked!=='h')return;
    var dx=e.changedTouches[0].clientX-x0;
    if(Math.abs(dx)>40){
      const slides=document.querySelectorAll('.poi-slide');
      const n=slides.length;
      if(n>0) selectHl((popIdx+(dx<0?1:-1)+n)%n);
    }
    locked=null;
  },{passive:true});
}());

// Close: X button + background tap
document.getElementById('popX').addEventListener('click',closePopup);
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closePopup();});


// Popup header drag-to-close
(()=>{
  const hd=document.getElementById('popHd'),box=document.getElementById('popupBox');
  let sy=0,st=0,drag=false;
  hd.addEventListener('pointerdown',e=>{hd.setPointerCapture(e.pointerId);sy=e.clientY;st=Date.now();drag=true;box.style.transition='none';});
  hd.addEventListener('pointermove',e=>{if(!drag)return;const dy=Math.max(0,e.clientY-sy);box.style.transform=`translateY(${dy}px)`;});
  hd.addEventListener('pointerup',e=>{
    if(!drag)return;drag=false;
    const dy=e.clientY-sy,dt=Date.now()-st;
    if(dy>80||(dy>40&&dt<250)) closePopup();
    else{box.style.transition='transform .2s ease';box.style.transform='';setTimeout(()=>box.style.transition='',200);}
  });
  hd.addEventListener('pointercancel',()=>{drag=false;box.style.transition='transform .2s ease';box.style.transform='';setTimeout(()=>box.style.transition='',200);});
})();

function closeCardExpand(){

    document.getElementById('ceOverlay').classList.remove('on');
    box.style.transition='';

}

// Swipe-down to close
(()=>{
  const box=document.getElementById('ceBox');
  let sy=0,st=0,dragging=false;
  box.addEventListener('pointerdown',e=>{
    if(e.target.closest('button')||e.target.closest('.ce-body')) return;
    sy=e.clientY; st=Date.now(); dragging=true;
    box.setPointerCapture(e.pointerId);
    box.style.transition='none';
  });
  box.addEventListener('pointermove',e=>{
    if(!dragging) return;
    const dy=Math.max(0,e.clientY-sy);
    box.style.transform=`translateY(${dy}px)`;
  });
  box.addEventListener('pointerup',e=>{
    if(!dragging) return; dragging=false;
    const dy=e.clientY-sy;
    const fast=Date.now()-st<300&&dy>40;
    if(dy>100||fast) closeCardExpand();
    else{box.style.transition='transform .2s ease';box.style.transform='';}
  });
})();
document.getElementById('ceOverlay').addEventListener('click',e=>{
